name: Sync from ailens.news
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build page
        run: |
          curl -s https://ailens.news/data/latest.json -o /tmp/latest.json
          python3 /dev/stdin << 'PYEOF'
import json, os, datetime

latest = json.load(open('/tmp/latest.json'))
items = latest.get('items', [])

TAG_C = {'technology':'#3b82f6','application':'#10b981','hardware':'#f59e0b','thought':'#8b5ef6'}
TAG_N = {'technology':'技术','application':'应用','hardware':'硬件','thought':'思想'}

ih = ''
for it in items:
    c = it.get('category',''); t = TAG_N.get(c,c); cl = TAG_C.get(c,'#999')
    ih += f'<li><span class="tag" style="background:{cl}">{t}</span> {it.get("title","")}</li>\n'

html = f'''<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI 日报</title><meta name="description" content="每日AI新闻精选"><style>*{{margin:0;padding:0;box-sizing:border-box}}body{{font-family:-apple-system,sans-serif;background:#f8f9fa;color:#333;line-height:1.6}}.container{{max-width:800px;margin:0 auto;padding:20px}}header{{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:40px 20px;text-align:center}}header h1{{font-size:2rem;margin-bottom:10px}}.card{{background:#fff;border-radius:12px;padding:24px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}}.card h3{{color:#667eea}}.card ul{{list-style:none}}.card li{{padding:8px 0;border-bottom:1px solid #f0f0f0}}.card li:last-child{{border:none}}.tag{{display:inline-block;color:#fff;padding:1px 8px;border-radius:10px;font-size:.75rem;margin-right:6px}}.btn{{display:inline-block;margin-top:12px;color:#667eea;text-decoration:none;font-weight:600}}footer{{text-align:center;padding:40px 20px;color:#999;font-size:.85rem}}footer a{{color:#667eea}}</style></head><body><header><h1>AI 日报</h1><p>每日 AI 新闻精选</p><p style="margin-top:10px;font-size:.85rem"><a href="https://ailens.news" style="color:#ffd700;font-weight:600">ailens.news</a></p></header><div class="container"><div class="card"><h3>最新日报</h3><ul>{ih}</ul><a href="https://ailens.news" class="btn" target="_blank">在 ailens.news 阅读全文 &rarr;</a></div></div><footer><p>内容自动同步 · <a href="https://ailens.news">ailens.news</a></p></footer></body></html>'''
open('index.html','w').write(html)
print(f'Generated: {len(items)} items')
PYEOF
      - name: Deploy
        run: |
          git config user.name "bot"
          git config user.email "bot@ailens.news"
          git add -A
          git diff --staged --quiet || git commit -m "sync: $(date +%Y-%m-%d)"
          git push
